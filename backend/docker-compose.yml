services:
  database:
    image: mysql:8.4
    container_name: tour-db
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      # Schema + seed run automatically on first startup of an empty volume.
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: tour-api
    ports:
      - "8090:8090"
    environment:
      DB_HOST: database
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  # One-shot Infostrada sync for local dev. Runs once on `up` and exits.
  # In production this is a Kubernetes CronJob (see k8s/cronjob.yaml) — same
  # image, same command, scheduled hourly with concurrencyPolicy: Forbid.
  sync:
    build:
      context: ../
      dockerfile: backend/Dockerfile
    container_name: tour-sync
    command: ["node", "src/sync-once.js"]
    environment:
      DB_HOST: database
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      INFOSTRADA_PHASE_ID: ${INFOSTRADA_PHASE_ID}
      INFOSTRADA_GC_CLASSIFICATION_ID: ${INFOSTRADA_GC_CLASSIFICATION_ID}
      INFOSTRADA_API_USER: ${INFOSTRADA_API_USER}
      INFOSTRADA_API_PASSWORD: ${INFOSTRADA_API_PASSWORD}
    depends_on:
      database:
        condition: service_healthy
    restart: "no"

volumes:
  db_data:
